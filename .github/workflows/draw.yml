name: Hourly MFSC Draw

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  draw:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Run draw script
        run: python draw_batch.py
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: mfsc-results-${{ github.run_number }}
          path: result/
          retention-days: 7