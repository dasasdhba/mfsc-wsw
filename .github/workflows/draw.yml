name: MFSC Draw

on:
  workflow_dispatch:
  repository_dispatch:
    types: [mfsc-draw-trigger]

jobs:
  draw:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Run draw script
        run: python draw_batch.py
        continue-on-error: true
      
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mfsc-results-${{ github.run_number }}
          path: result/
          retention-days: 7
